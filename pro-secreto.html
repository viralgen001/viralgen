
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ViralGen PRO - Acesso Exclusivo</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .box-pro { background: #111; padding: 25px; border-radius: 15px; border: 2px solid var(--secundaria); margin-bottom: 20px; }
        .texto-pro { color: var(--secundaria); font-weight: bold; font-size: 1.2rem; }
        .box-ideia { background: #222; padding: 20px; border-radius: 10px; border: 1px dashed var(--secundaria); margin: 20px 0; min-height: 50px; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #fff; }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="logo-text">ViralGen PRO 🚀</h1>

        <div id="trava-senha">
            <p>Insira sua Chave de Acesso:</p>
            <input type="password" id="chaveMaster" placeholder="Chave enviada pela Kiwify...">
            <button class="btn-login" onclick="verificarChave()">LIBERAR PAINEL PRO</button>
        </div>

        <div id="conteudo-pro" class="hidden">
            <div class="box-pro">
                <p class="texto-pro">Painel PRO Liberado!</p>
                <p>Bem-vindo ao nível elite, Pedro Gabriel.</p>
            </div>

            <div class="grid-nichos">
                <button class="nicho-btn" onclick="gerarPro('financas')">💰 Finanças PRO</button>
                <button class="nicho-btn" onclick="gerarPro('cortes')">🎬 Cortes PRO</button>
            </div>

            <div id="resultado-pro" class="box-ideia">
                Selecione um nicho PRO para gerar uma das 50 ideias!
            </div>

            <button class="btn-login" style="background: #444;" onclick="window.location.href='index.html'">Sair do Modo PRO</button>
        </div>

        <footer class="creditos">
            <p>Dono: Pedro Gabriel | Desenvolvedor: Pedro Gabriel</p>
        </footer>
    </div>

    <script>
        function verificarChave() {
            const senha = document.getElementById('chaveMaster').value;
            if(senha === "acessovg") { 
                document.getElementById('trava-senha').classList.add('hidden');
                document.getElementById('conteudo-pro').classList.remove('hidden');
            } else {
                alert("Chave inválida! Verifique seu e-mail.");
            }
        }

        function gerarPro(tipo) {
            const ideiasFinancas = [
                "Como investir seus primeiros 100 reais.", "3 Erros que te impedem de enriquecer jovem.", "A estratégia do milhão com fundos imobiliários.", "Como fazer renda extra usando apenas o celular.", "O segredo para sair das dívidas em 3 meses.", "5 Cartões de crédito fáceis de aprovar em 2026.", "Como ganhar dinheiro com milhas aéreas.", "A verdade sobre o Day Trade que ninguém te conta.", "Como montar sua reserva de emergência do zero.", "Onde investir 500 reais por mês para aposentar cedo.", "Como ganhar em dólar trabalhando do Brasil.", "3 Negócios lucrativos para começar com pouco dinheiro.", "O que os bancos escondem sobre a poupança.", "Como economizar 30% do seu salário todo mês.", "A psicologia do dinheiro: por que você gasta tanto?", "Como declarar investimentos no imposto de renda.", "A melhor corretora para quem está começando.", "Como comprar sua primeira ação passo a passo.", "Investir em Bitcoin agora: vale a pena?", "Como criar um orçamento familiar que funciona.", "Dicas para aumentar seu score de crédito rápido.", "O guia definitivo sobre Tesouro Direto.", "Como negociar descontos em qualquer compra.", "Mentalidade milionária: mude seus hábitos hoje.", "O impacto da taxa Selic nos seus investimentos."
            ];

            const ideiasCortes = [
                "O dia em que o convidado revelou seu maior segredo.", "A lição de superação que emocionou o apresentador.", "Como identificar uma mentira em 30 segundos (Corte Podcast).", "O conselho que mudou a carreira do bilionário.", "A discussão mais polêmica sobre inteligência artificial.", "O segredo para ter disciplina inabalável.", "Como os grandes influenciadores criam roteiros virais.", "O corte que gerou 1 milhão de visualizações em 24h.", "A técnica de respiração que controla a ansiedade.", "Como começar no YouTube do zero absoluto.", "O momento mais engraçado dos bastidores.", "A verdade bizarra sobre a exploração espacial.", "Como os estoicos lidavam com críticas e haters.", "O erro fatal que faliu uma empresa gigante.", "Como ler 1 livro por semana e absorver tudo.", "A rotina matinal dos CEOs de sucesso.", "Por que o TikTok entrega mais os vídeos curtos?", "Como configurar a iluminação do seu setup.", "O corte proibido que quase derrubou o canal.", "A entrevista que previu o futuro da economia.", "Como perder o medo de falar em público.", "O segredo por trás dos maiores podcasts do Brasil.", "Como ganhar seguidores reais sem gastar nada.", "A história real por trás de um filme famoso.", "O que acontece se você abandonar as redes sociais?"
            ];

            let lista = tipo === 'financas' ? ideiasFinancas : ideiasCortes;
            let aleatorio = Math.floor(Math.random() * lista.length);
            document.getElementById('resultado-pro').innerText = lista[aleatorio];
        }
    </script>
</body>
</html>
